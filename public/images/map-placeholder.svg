<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #F3F4F6; }
      .road { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 20; }
      .park { fill: #D1FAE5; }
      .block { fill: #E5E7EB; }
      .pin-shadow { fill: #000; opacity: 0.2; }
      .pin { fill: #EF4444; }
      .pin-center { fill: #FFF; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" class="bg" />
  
  <!-- City Blocks -->
  <rect x="50" y="50" width="250" height="200" class="block" rx="5" />
  <rect x="350" y="50" width="400" height="200" class="block" rx="5" />
  <rect x="50" y="350" width="250" height="200" class="block" rx="5" />
  <rect x="350" y="350" width="400" height="200" class="block" rx="5" />
  
  <!-- Roads (Main Intersection) -->
  <line x1="0" y1="300" x2="800" y2="300" class="road" stroke-width="40" />
  <line x1="325" y1="0" x2="325" y2="600" class="road" stroke-width="40" />
  
  <!-- Park Area -->
  <rect x="500" y="400" width="200" height="100" class="park" rx="10" />

  <!-- Building Names (Abstract) -->
  <text x="175" y="150" font-family="sans-serif" font-size="20" fill="#9CA3AF" text-anchor="middle">수원시청</text>
  <text x="550" y="150" font-family="sans-serif" font-size="20" fill="#9CA3AF" text-anchor="middle">홈플러스</text>

  <!-- Location Pin -->
  <ellipse cx="325" cy="330" rx="20" ry="10" class="pin-shadow" />
  <path d="M325 300 C325 320 325 330 325 330 C325 330 325 320 325 300 Z" fill="#EF4444" /> <!-- Manual pin shape would be complex, simplified below -->
  
  <circle cx="325" cy="270" r="25" class="pin" />
  <path d="M325 270 L300 270 L325 330 L350 270 Z" class="pin" />
  <circle cx="325" cy="270" r="10" class="pin-center" />

  <!-- Label -->
  <rect x="360" y="240" width="180" height="40" rx="5" fill="white" stroke="#E5E7EB" shadow="true" />
  <text x="450" y="265" font-family="sans-serif" font-size="14" font-weight="bold" fill="#111827" text-anchor="middle">진양PVC건재총판</text>
  <path d="M360 260 L350 260 L360 250 Z" fill="white" stroke="#E5E7EB" /> <!-- Speech bubble tailish -->
</svg>
