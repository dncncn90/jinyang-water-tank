<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Body -->
  <rect x="100" y="80" width="200" height="280" rx="10" ry="10" fill="url(#blueGrad)" />
  
  <!-- Ribs (Reinforcement) -->
  <rect x="95" y="120" width="210" height="15" rx="5" fill="#1E40AF" opacity="0.3" />
  <rect x="95" y="180" width="210" height="15" rx="5" fill="#1E40AF" opacity="0.3" />
  <rect x="95" y="240" width="210" height="15" rx="5" fill="#1E40AF" opacity="0.3" />
  <rect x="95" y="300" width="210" height="15" rx="5" fill="#1E40AF" opacity="0.3" />

  <!-- Top Dome -->
  <path d="M100 80 Q200 60 300 80" fill="url(#blueGrad)" />
  
  <!-- Lid -->
  <ellipse cx="200" cy="70" rx="40" ry="10" fill="url(#lidGrad)" />
  <rect x="180" y="60" width="40" height="10" fill="#333" />
  
  <!-- Label -->
  <text x="200" y="200" font-family="Arial" font-size="24" fill="white" text-anchor="middle" opacity="0.8" font-weight="bold">JINYANG</text>
  <text x="200" y="225" font-family="Arial" font-size="14" fill="white" text-anchor="middle" opacity="0.8">PE TANK</text>
</svg>
