<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4B5563;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F2937;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Capsule Body -->
  <rect x="50" y="100" width="300" height="200" rx="100" ry="100" fill="url(#blackGrad)" />
  
  <!-- Ribs -->
  <rect x="100" y="90" width="20" height="220" fill="#111" opacity="0.2" />
  <rect x="190" y="90" width="20" height="220" fill="#111" opacity="0.2" />
  <rect x="280" y="90" width="20" height="220" fill="#111" opacity="0.2" />
  
  <!-- Top Risers/Manholes -->
  <rect x="120" y="60" width="40" height="40" fill="#374151" />
  <rect x="240" y="60" width="40" height="40" fill="#374151" />
  
  <!-- Pipe Connections -->
  <rect x="20" y="180" width="30" height="40" fill="#374151" />
  <rect x="350" y="180" width="30" height="40" fill="#374151" />

  <text x="200" y="240" font-family="Arial" font-size="20" fill="white" text-anchor="middle" opacity="0.5">SEPTIC TANK</text>
</svg>
