<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E5E7EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1D5DB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="80" y="340" width="240" height="40" fill="#1F2937" />

  <!-- Walls -->
  <rect x="90" y="80" width="220" height="260" fill="url(#wallGrad)" stroke="#9CA3AF" />
  
  <!-- Roof -->
  <path d="M70 80 L200 40 L330 80 Z" fill="#F59E0B" />
  
  <!-- Door -->
  <rect x="130" y="120" width="140" height="220" fill="#F9FAFB" stroke="#D1D5DB" />
  
  <!-- Vent -->
  <rect x="140" y="140" width="120" height="20" fill="#E5E7EB" rx="5" />
  <rect x="140" y="170" width="120" height="20" fill="#E5E7EB" rx="5" />
  
  <!-- Handle -->
  <circle cx="250" cy="230" r="5" fill="#4B5563" />
  
  <!-- Sign -->
  <rect x="180" y="100" width="40" height="15" fill="#2563EB" />
</svg>
