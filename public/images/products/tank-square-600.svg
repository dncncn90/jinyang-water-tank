<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Body Cube -->
  <rect x="80" y="120" width="240" height="180" fill="url(#blueGrad)" stroke="#1E40AF" stroke-width="2" />
  
  <!-- Top Face (Perspective) -->
  <path d="M80 120 L130 80 L370 80 L320 120 Z" fill="#60A5FA" />
  
  <!-- Side Face (Perspective) -->
  <path d="M320 120 L370 80 L370 260 L320 300 Z" fill="#2563EB" />

  <!-- Lid -->
  <circle cx="220" cy="100" r="25" fill="#111" />
  
  <!-- Ribs (Cross pattern) -->
  <line x1="80" y1="120" x2="320" y2="300" stroke="#1E40AF" stroke-width="2" opacity="0.3" />
  <line x1="320" y1="120" x2="80" y2="300" stroke="#1E40AF" stroke-width="2" opacity="0.3" />
  
  <rect x="150" y="180" width="100" height="60" fill="#1E3A8A" opacity="0.2" rx="5" />
</svg>
